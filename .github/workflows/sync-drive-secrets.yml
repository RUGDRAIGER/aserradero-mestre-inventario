name: Sincronizar secrets Drive a Supabase

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.20.12

      - name: Validar acceso a carpeta Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          pip install --quiet cryptography
          chmod +x scripts/diagnose-drive.py
          python3 scripts/diagnose-drive.py

      - name: Subir secrets a Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Falta SUPABASE_ACCESS_TOKEN en GitHub Secrets"
            exit 1
          fi
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::error::Falta GOOGLE_SERVICE_ACCOUNT_JSON en GitHub Secrets"
            exit 1
          fi
          if [ -z "${GOOGLE_DRIVE_FOLDER_ID:-}" ]; then
            echo "::error::Falta GOOGLE_DRIVE_FOLDER_ID en GitHub Secrets"
            exit 1
          fi
          COMPACT_JSON=$(echo "$GOOGLE_SERVICE_ACCOUNT_JSON" | jq -c .)
          printf 'GOOGLE_DRIVE_FOLDER_ID=%s\nGOOGLE_SERVICE_ACCOUNT_JSON=%s\n' \
            "$GOOGLE_DRIVE_FOLDER_ID" "$COMPACT_JSON" > /tmp/supabase-secrets.env
          supabase secrets set --project-ref qshvtyzedbghgsbpzzcn --env-file /tmp/supabase-secrets.env
          rm -f /tmp/supabase-secrets.env
          echo "OK — secrets en Supabase"

      - name: Redesplegar generate-receipt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase link --project-ref qshvtyzedbghgsbpzzcn --password "$SUPABASE_DB_PASSWORD"
          supabase functions deploy generate-receipt --no-verify-jwt
