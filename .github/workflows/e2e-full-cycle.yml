name: Prueba E2E ciclo completo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/e2e-full-cycle.sh"
      - ".github/workflows/e2e-full-cycle.yml"
      - "supabase/**"
      - "src/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://qshvtyzedbghgsbpzzcn.supabase.co
      DEMO_EMAIL: supervisor@aserradero-mestre.demo
      DEMO_PASSWORD: MestreSuper2026!
      PROJECT_REF: qshvtyzedbghgsbpzzcn
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias de verificación
        run: pip install --quiet cryptography

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Obtener API keys
        id: keys
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/api-keys?reveal=true")
          ANON=$(echo "$RESP" | jq -r '
            [.[] | select(.name == "anon" or .type == "publishable") | .api_key] | first // empty
          ')
          SERVICE=$(echo "$RESP" | jq -r '
            [.[] | select(.name == "service_role" or .type == "service_role" or .type == "secret") | .api_key] | first // empty
          ')
          [ -n "$ANON" ] && [ -n "$SERVICE" ] || (echo "$RESP" | jq 'map({name,type})'; exit 1)
          echo "::add-mask::${ANON}"
          echo "::add-mask::${SERVICE}"
          echo "anon=${ANON}" >> "$GITHUB_OUTPUT"
          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"

      - name: Aplicar migraciones pendientes (RLS supervisor)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref qshvtyzedbghgsbpzzcn --password "$SUPABASE_DB_PASSWORD"
          supabase db push --include-all

      - name: Desplegar Edge Function generate-receipt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Doble deploy: evita 404 transitorio tras CI (supabase/supabase#35426)
          supabase functions deploy generate-receipt --no-verify-jwt --project-ref qshvtyzedbghgsbpzzcn
          sleep 5
          supabase functions deploy generate-receipt --no-verify-jwt --project-ref qshvtyzedbghgsbpzzcn
          echo "Funciones desplegadas:"
          supabase functions list --project-ref qshvtyzedbghgsbpzzcn || true
          echo "Esperando propagación de Edge Functions..."
          sleep 25
          echo "Verificando ruta HTTP generate-receipt..."
          CODE=$(curl -sS -o /tmp/fn-probe.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/generate-receipt" \
            -H "apikey: ${{ steps.keys.outputs.anon }}" \
            -H "Authorization: Bearer ${{ steps.keys.outputs.service }}" \
            -H "Content-Type: application/json" \
            -d '{"request_id":"00000000-0000-0000-0000-000000000000"}' || echo "000")
          echo "HTTP $CODE — $(head -c 200 /tmp/fn-probe.json)"
          if [ "$CODE" = "404" ] && grep -q 'Requested function was not found' /tmp/fn-probe.json 2>/dev/null; then
            echo "::warning::Gateway no enruta generate-receipt desde CI (función ACTIVE en list). La app en Pages usa el cliente JS."
          fi

      - name: Asegurar usuario supervisor demo
        env:
          SERVICE_KEY: ${{ steps.keys.outputs.service }}
        run: |
          set -euo pipefail
          BODY=$(jq -n --arg e "$DEMO_EMAIL" --arg p "$DEMO_PASSWORD" \
            '{email:$e,password:$p,email_confirm:true}')
          HTTP=$(curl -sS -o /tmp/u.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/auth/v1/admin/users" \
            -H "Authorization: Bearer ${SERVICE_KEY}" -H "apikey: ${SERVICE_KEY}" \
            -H "Content-Type: application/json" -d "$BODY")
          [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || [ "$HTTP" = "422" ] || [ "$HTTP" = "400" ] || exit 1
          echo "Usuario supervisor listo"

      - name: Validar formato GOOGLE_DRIVE_FOLDER_ID
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          set -euo pipefail
          F="${GOOGLE_DRIVE_FOLDER_ID:-}"
          if [ -z "$F" ]; then
            echo "::error::GOOGLE_DRIVE_FOLDER_ID vacío en GitHub Secrets"
            exit 1
          fi
          if echo "$F" | grep -qiE 'TU_ID|PLACEHOLDER|XXXX|pega|nombre-del-archivo'; then
            echo "::error::GOOGLE_DRIVE_FOLDER_ID parece un placeholder. Pon el ID real de tu carpeta Drive."
            exit 1
          fi
          echo "Secret de carpeta presente (longitud ${#F})"

      - name: Diagnóstico Google Drive (subida directa)
        id: drive_diag
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          chmod +x scripts/diagnose-drive.py
          python3 scripts/diagnose-drive.py && echo "drive_ok=true" >> "$GITHUB_OUTPUT" || echo "drive_ok=false" >> "$GITHUB_OUTPUT"

      - name: Loop prueba y corrección (Drive + E2E)
        env:
          ANON_KEY: ${{ steps.keys.outputs.anon }}
          SERVICE_KEY: ${{ steps.keys.outputs.service }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          set -uo pipefail
          chmod +x scripts/e2e-full-cycle.sh
          export ANON_KEY SERVICE_KEY SUPABASE_URL SUPABASE_ACCESS_TOKEN
          # Drive estricto salvo que el diagnóstico de carpeta falle (ID inválido o sin compartir)
          if [ "${{ steps.drive_diag.outputs.drive_ok }}" = "true" ]; then
            export SKIP_DRIVE_CHECK=0
          else
            export SKIP_DRIVE_CHECK=1
          fi
          E2E_OK=1

          for attempt in 1 2 3; do
            echo "--- Intento E2E $attempt/3 ---"
            if scripts/e2e-full-cycle.sh; then
              echo "E2E exitoso en intento $attempt"
              E2E_OK=0
              break
            fi
            echo "::warning::E2E falló en intento $attempt"
            if [ "$attempt" -lt 3 ]; then
              echo "Re-sincronizando secrets Drive y redesplegando generate-receipt..."
              COMPACT_JSON=$(echo "$GOOGLE_SERVICE_ACCOUNT_JSON" | jq -c .)
              printf 'GOOGLE_DRIVE_FOLDER_ID=%s\nGOOGLE_SERVICE_ACCOUNT_JSON=%s\n' \
                "$GOOGLE_DRIVE_FOLDER_ID" "$COMPACT_JSON" > /tmp/supabase-secrets.env
              supabase secrets set --project-ref qshvtyzedbghgsbpzzcn --env-file /tmp/supabase-secrets.env || true
              rm -f /tmp/supabase-secrets.env
              supabase functions deploy generate-receipt --no-verify-jwt --project-ref qshvtyzedbghgsbpzzcn || true
              sleep 15
            fi
          done
          if [ "$E2E_OK" -ne 0 ]; then
            echo "::error::E2E núcleo falló tras 3 intentos"
            exit 1
          fi
          echo "E2E núcleo (DB, login, retiro, PDF Storage, RLS) OK"
          if [ "${{ steps.drive_diag.outputs.drive_ok }}" != "true" ]; then
            echo "::warning::Google Drive: carpeta no accesible — corrige GOOGLE_DRIVE_FOLDER_ID y comparte la carpeta con aserradero-mestre-pdf@proyecto-de-prueba-497903.iam.gserviceaccount.com (Editor). Ver docs/GOOGLE_DRIVE_SETUP.md"
            echo "::warning::El núcleo del ciclo (DB, retiro, stock, comprobante) pasó correctamente."
          else
            echo "E2E completo incluyendo respaldo en Drive"
          fi
