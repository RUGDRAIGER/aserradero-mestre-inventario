name: Aplicar migraciones Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/APPLY_IN_DASHBOARD.sql"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: qshvtyzedbghgsbpzzcn
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Enlazar proyecto y aplicar migraciones
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Falta el secret SUPABASE_ACCESS_TOKEN en GitHub (Settings → Secrets → Actions)."
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Falta el secret SUPABASE_DB_PASSWORD en GitHub."
            exit 1
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push
